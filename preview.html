<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Despesas</title>
<style>
body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f5f5f5;}
.box { background:#fff; padding:30px; border-radius:10px; width:300px; box-shadow:0 5px 20px rgba(0,0,0,0.1);}
input { width:100%; padding:10px; margin-bottom:10px;}
button { width:100%; padding:10px; background:black; color:white; border:none; cursor:pointer;}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="msg" style="color:red;"></p>

<hr>
<p><strong>Teste:</strong></p>
<p>sergio@empresa.com.br / 123456</p>
<p>anaflavia@gruposupersafra.com.br / admin</p>
</div>

<script>
const usuarios = {
  'sergio@empresa.com.br': { nome: 'Sergio', perfil: 'consultor', senha: '123456' },
  'anaflavia@gruposupersafra.com.br': { nome: 'Ana Flávia', perfil: 'admin', senha: 'admin' }
};

function login() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const senha = document.getElementById('senha').value;
  const msg = document.getElementById('msg');

  const user = usuarios[email];

  if (!user) {
    msg.textContent = "E-mail não encontrado";
    return;
  }

  if (senha !== user.senha) {
    msg.textContent = "Senha incorreta";
    return;
  }

  msg.style.color = "green";
  msg.textContent = "Login realizado com sucesso!";

  setTimeout(() => {
    alert("Bem-vindo " + user.nome + " (" + user.perfil + ")");
  }, 300);
}
</script>

</body>
</html>
